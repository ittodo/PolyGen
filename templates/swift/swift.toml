# Swift Language Configuration for PolyGen
# Generates Codable structs/enums plus SwiftData model classes.

extension = ".swift"

[templates]
main = "swift_file.ptpl"

[[templates.extra]]
template = "swift_swiftdata_file.ptpl"
output = "{{stem}}_swiftdata.swift"

[[templates.extra]]
template = "swift_redis_keys_file.ptpl"
output = "{{stem}}_redis_keys.swift"

[[templates.extra]]
template = "swift_container_file.ptpl"
output = "{{stem}}_container.swift"

[[templates.extra]]
template = "swift_sqlite_accessor_file.ptpl"
output = "{{stem}}_sqlite_accessor.swift"

[[templates.extra]]
template = "swift_binary_refs_file.ptpl"
output = "{{stem}}_binary_refs.swift"

[rhai]
prelude = ["rhai_utils/type_mapping.rhai"]
