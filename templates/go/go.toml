# Go Language Configuration for PolyGen
# This file configures the Go code generation settings.

# File extension for generated Go files
extension = ".go"

# Static files to copy to the output directory
[static_files]
"polygen_support.go" = "static/go/polygen_support.go"

# Type mapping: poly type → Go type
[type_map]
u8 = "uint8"
u16 = "uint16"
u32 = "uint32"
u64 = "uint64"
i8 = "int8"
i16 = "int16"
i32 = "int32"
i64 = "int64"
f32 = "float32"
f64 = "float64"
bool = "bool"
string = "string"
bytes = "[]byte"

[type_map.optional]
format = "*{{type}}"

[type_map.list]
format = "[]{{type}}"

# Rhai prelude scripts for %logic blocks in ptpl templates
[rhai]
prelude = ["rhai_utils/type_mapping.rhai"]

# Template configuration
[templates]
# Main template for generating Go structs (using new PolyTemplate engine)
main = "go_file.ptpl"

# Extra templates to run after the main template (using PolyTemplate engine)
[[templates.extra]]
template = "go_container_file.ptpl"

[[templates.extra]]
template = "go_loaders_file.ptpl"
output = "{{stem}}_loaders.go"

[[templates.extra]]
template = "go_binary_refs_file.ptpl"
output = "{{stem}}_binary_refs.go"

[[templates.extra]]
template = "go_sqlite_accessor_file.ptpl"
output = "{{stem}}_sqlite_accessor.go"
per_file = false

[[templates.extra]]
template = "go_redis_keys_file.ptpl"
output = "{{stem}}_redis_keys.go"
