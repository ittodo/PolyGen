# Kotlin Language Configuration for PolyGen
# Generates kotlinx.serialization data classes and enums.

extension = ".kt"

[templates]
main = "kotlin_file.ptpl"

[[templates.extra]]
template = "kotlin_redis_keys_file.ptpl"
output = "{{stem}}_redis_keys.kt"

[[templates.extra]]
template = "kotlin_container_file.ptpl"
output = "{{stem}}_container.kt"

[[templates.extra]]
template = "kotlin_sqlite_accessor_file.ptpl"
output = "{{stem}}_sqlite_accessor.kt"

[[templates.extra]]
template = "kotlin_binary_refs_file.ptpl"
output = "{{stem}}_binary_refs.kt"

[rhai]
prelude = ["rhai_utils/type_mapping.rhai"]
